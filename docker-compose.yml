services:
  luanti:
    image: lscr.io/linuxserver/luanti:latest
    container_name: luanti-aliveworld
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - CLI_ARGS=--worldname aliveworld --gameid mineclonia --port 30000
    volumes:
      - ./data:/config/.minetest
    ports:
      - "30000:30000/udp"
    restart: unless-stopped
