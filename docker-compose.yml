services:
  luanti:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luanti-aliveworld
    stdin_open: true
    tty: true
    environment:
      - TZ=Europe/Amsterdam
      - LUANTI_USER_PATH=/config/.minetest
    volumes:
      - ./data:/config/.minetest
      - ./config/luanti.conf:/config/.minetest/minetest.conf
      - ./local_mods/aliveworld_core:/config/.minetest/mods/aliveworld_core
      - ./local_mods/aliveworld_player:/config/.minetest/mods/aliveworld_player
      - ./local_mods/aliveworld_test_suite:/config/.minetest/mods/aliveworld_test_suite
    ports:
      - "30000:30000/udp"
    restart: unless-stopped
    command: >
      luantiserver
      --terminal
      --config /config/.minetest/minetest.conf
      --world /config/.minetest/worlds/aliveworld
      --gameid mineclonia
      --port 30000
